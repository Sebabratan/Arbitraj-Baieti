<!DOCTYPE html>
<html>
<head>
    <title>🌍 World Championship Cloud System</title>

    <style>
        body {
            background: radial-gradient(circle, #050814, #000);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: gold;
            font-size: 36px;
        }

        .box {
            background: rgba(255,255,255,0.05);
            margin: 15px auto;
            padding: 15px;
            width: 85%;
            border-radius: 12px;
        }

        input, select {
            padding: 8px;
            margin: 3px;
        }

        button {
            padding: 10px 18px;
            background: gold;
            border: none;
            font-weight: bold;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
        }

        th {
            background: gold;
            color: black;
            padding: 10px;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        .gold { color: gold; font-weight: bold; }
        .silver { color: silver; font-weight: bold; }
        .bronze { color: #cd7f32; font-weight: bold; }
    </style>
</head>

<body>

<h1>🌍 WORLD CHAMPIONSHIP CLOUD SYSTEM</h1>

<div class="box">
    <h2>➕ Add Athlete</h2>
    <form method="POST" action="/add">
        <input name="name" placeholder="Name">
        <input name="club" placeholder="Club">
        <button>Add</button>
    </form>
</div>

<div class="box">
    <h2>👨‍⚖️ Judging Panel (7 E Judges)</h2>

    <form method="POST" action="/judge">
        <select name="athlete_id">
            {% for a in athletes %}
                <option value="{{a[0]}}">{{a[1]}} ({{a[2]}})</option>
            {% endfor %}
        </select>

        <input name="d" placeholder="D Score">

        <br>

        <input name="e1" placeholder="E1">
        <input name="e2" placeholder="E2">
        <input name="e3" placeholder="E3">
        <input name="e4" placeholder="E4">
        <input name="e5" placeholder="E5">
        <input name="e6" placeholder="E6">
        <input name="e7" placeholder="E7">

        <input name="penalty" placeholder="Penalty">

        <button>Submit Score</button>
    </form>
</div>

<div class="box">
    <h2>🏆 LIVE WORLD RANKING</h2>

    <table>
        <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Club</th>
            <th>Total</th>
            <th>E</th>
            <th>D</th>
        </tr>

        <tbody id="board"></tbody>
    </table>
</div>

<script>
async function loadRankings() {
    const res = await fetch("/api/rankings");
    const data = await res.json();

    let html = "";

    let last = null;
    let rank = 0;
    let display = 0;

    data.forEach((r, i) => {

        let total = r[2];
        let e = r[3];
        let d = r[4];

        if (!last || e !== last.e || d !== last.d) {
            display = i + 1;
            rank = display;
            last = {e, d};
        } else {
            display = rank;
        }

        let name = r[0];

        if (display === 1) name = "🥇 " + name;
        else if (display === 2) name = "🥈 " + name;
        else if (display === 3) name = "🥉 " + name;

        html += `
        <tr>
            <td>${display}</td>
            <td>${name}</td>
            <td>${r[1]}</td>
            <td>${total.toFixed(3)}</td>
            <td>${e.toFixed(3)}</td>
            <td>${d.toFixed(3)}</td>
        </tr>
        `;
    });

    document.getElementById("board").innerHTML = html;
}

setInterval(loadRankings, 2000);
loadRankings();
</script>

</body>
</html>
